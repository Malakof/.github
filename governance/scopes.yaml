# Conventional Commits — allowed scopes per repo
#
# Read by .github/workflows/enforce-conventions.yml to validate PR titles.
# Scopes are optional but must belong to the list when present.
#
# Validated title format: <type>(<scope>)?: <subject>
# If scope absent -> tolerated.
# If scope present -> must belong to `scopes[<repo>]`.

schema: crystal-scopes/v1
version: 1.0.0

scopes:

  crystal-dark-factory-poc:
    - dispatcher
    - ingestion
    - adapter
    - profiles
    - openhands
    - sandbox
    - evidence
    - validation
    - dark-factory
    - operator
    - cli
    - docs
    - tests

  crystal-dark-factory-target-lab:
    - scenarios
    - hitl
    - evidence
    - adapter
    - tests
    - docs

  crystal-discord-bot:
    - bot
    - commands
    - intents
    - corpus
    - commit-qa
    - weekly-digest
    - infra
    - tests
    - docs

  crystal-specs:
    - ontologie
    - specifications
    - chains
    - prompts
    - integrations
    - verticales
    - docs

  crystal-assistant-ui-poc:
    - web
    - mobile
    - chat
    - api
    - mission
    - validation
    - tests
    - docs

  crystal-company:
    - kernel
    - harness
    - adapters
    - skills
    - agents
    - builders
    - missions
    - tests
    - docs

  Malakof/.github:
    - labels
    - templates
    - workflows
    - skills
    - scripts
    - governance
    - docs

# Universal scopes (accepted on any repo)
universal_scopes:
  - deps
  - ci
  - release
  - revert
