# Crystal GitHub labels — canonical harmonised taxonomy
#
# Source of truth: Malakof/.github (this repo)
# Schema: crystal-labels/v1
# Each Crystal repo applies this taxonomy via scripts/sync-labels.py.
#
# Conventions:
#   - lowercase, kebab-case, namespaces separated by `:`
#   - max 2 namespace levels (e.g. `crystal:agent:ceo`)
#   - hex colors without `#`, consistent Crystal palette
#   - `applies_to`: list of repos OR "all" OR "crystal-*" (glob)
#   - `emitted_by`: human | kernel | dark-factory | ci  (who may set the label)
#   - `required`: bool (one label of this category required on each issue/PR)
#   - description max 100 characters (GitHub API limit)

schema: crystal-labels/v1
version: 1.1.0

# Conventional Commit PR types and issue-title types intentionally differ from
# the functional type:* taxonomy. This total mapping is the canonical bridge
# used by deterministic PR and issue validation.
title_type_map:
  feat: type:feature
  fix: type:bug
  docs: type:docs
  style: type:chore
  refactor: type:refactor
  perf: type:refactor
  test: type:test
  build: type:chore
  ci: type:chore
  chore: type:chore
  revert: type:bug
  feature: type:feature
  bug: type:bug
  spike: type:spike
  epic: type:epic

# =============================================================================
# 1. UNIVERSAL — applied to ALL Crystal repos, mandatory
# =============================================================================

categories:

  priority:
    description: "Execution priority. Exactly one per issue/PR."
    required: true
    applies_to: all
    emitted_by: [human, dark-factory]
    labels:
      - name: priority:p0
        color: b60205
        description: "Must ship for the current milestone. Blocking."
      - name: priority:p1
        color: fbca04
        description: "Important, ship if no P0 blocker."
      - name: priority:p2
        color: 0e8a16
        description: "Nice to have, post-milestone."
      - name: priority:p3
        color: 0b6e1f
        description: "Long-term backlog, no scheduled date."

  type:
    description: "Deliverable nature. Exactly one per issue/PR."
    required: true
    applies_to: all
    emitted_by: [human, dark-factory]
    labels:
      - name: type:epic
        color: 6f42c1
        description: "Parent issue with sub-issues. Use GitHub native sub-issues, not Markdown checklists."
      - name: type:feature
        color: 1d76db
        description: "New feature or implementation."
      - name: type:bug
        color: d73a4a
        description: "Anomaly to fix."
      - name: type:chore
        color: cfd3d7
        description: "Maintenance, deps, tooling, no functional change."
      - name: type:docs
        color: 0075ca
        description: "Documentation, ADR, PRD, README."
      - name: type:refactor
        color: a2eeef
        description: "Internal reorganisation, no behaviour change."
      - name: type:spike
        color: f9d0c4
        description: "Time-boxed investigation, deliverable = note + decision."
      - name: type:test
        color: 1d76db
        description: "Test coverage or validation contract."

  status:
    description: "Backlog progression state. Feeds Projects v2 overlay."
    required: false
    applies_to: all
    emitted_by: [human, kernel, dark-factory]
    labels:
      - name: status:needs-triage
        color: D4C5F9
        description: "To be evaluated before pickup."
      - name: status:needs-info
        color: f9d0c4
        description: "Waiting for clarification before pickup."
      - name: status:ready-for-agent
        color: 0e8a16
        description: "Ready for an agent to pick up."
      - name: status:ready-for-human
        color: 0e8a16
        description: "Ready for a human maintainer to pick up."
      - name: status:in-progress
        color: 1f6feb
        description: "Work in progress."
      - name: status:blocked
        color: d1242f
        description: "Blocked — external dependency, decision pending."
      - name: status:wontfix
        color: ffffff
        description: "Will not be actioned."

# =============================================================================
# 2. KERNEL — projected automatically by paperclip kernel (read-only for humans)
# =============================================================================

  crystal_kernel_agent:
    description: "Agent lane assigned by kernel. Do not set manually."
    required: false
    applies_to: [crystal-company, crystal-assistant-ui-poc]
    emitted_by: [kernel]
    labels:
      - name: crystal:agent:ceo
        color: d4c5f9
        description: "Mission owned by CEO agent."
      - name: crystal:agent:cto
        color: d4c5f9
        description: "Mission owned by CTO agent."
      - name: crystal:agent:spec-lead
        color: d4c5f9
        description: "Mission owned by spec-lead."
      - name: crystal:agent:feature-implementer
        color: d4c5f9
        description: "Feature implementer."
      - name: crystal:agent:reviewer
        color: d4c5f9
        description: "Reviewer."
      - name: crystal:agent:validator
        color: d4c5f9
        description: "Validator."
      - name: crystal:agent:ui-debugger
        color: d4c5f9
        description: "UI debugger."
      - name: crystal:agent:api-debugger
        color: d4c5f9
        description: "API debugger."

  crystal_kernel_stage:
    description: "Canonical mission stage. Projected by kernel."
    required: false
    applies_to: [crystal-company, crystal-assistant-ui-poc]
    emitted_by: [kernel]
    labels:
      - name: crystal:stage:prepare
        color: bfd4f2
        description: "Preparation."
      - name: crystal:stage:spec-contract
        color: bfd4f2
        description: "Spec contract in progress."
      - name: crystal:stage:implement
        color: bfd4f2
        description: "Implementation."
      - name: crystal:stage:review
        color: bfd4f2
        description: "Review."
      - name: crystal:stage:ship
        color: bfd4f2
        description: "Shipping."

  crystal_kernel_status:
    description: "Runtime state projected by kernel."
    required: false
    applies_to: [crystal-company, crystal-assistant-ui-poc]
    emitted_by: [kernel]
    labels:
      - name: crystal:status:todo
        color: 6e7781
        description: "Awaiting execution."
      - name: crystal:status:running
        color: 1f6feb
        description: "Running on a runtime."
      - name: crystal:status:blocked
        color: d1242f
        description: "Blocked by a runtime event."
      - name: crystal:status:done
        color: 0e8a16
        description: "Done."
      - name: crystal:status:needs-human
        color: f9d0c4
        description: "HITL requested by kernel."

  crystal_kernel_runtime:
    description: "Runtime executing the mission."
    required: false
    applies_to: [crystal-company, crystal-assistant-ui-poc]
    emitted_by: [kernel]
    labels:
      - name: crystal:runtime:codex
        color: bfdadc
        description: "Codex lane."
      - name: crystal:runtime:claude
        color: bfdadc
        description: "Claude lane."
      - name: crystal:runtime:openhands
        color: bfdadc
        description: "OpenHands lane."

  crystal_kernel_topology:
    description: "Issue-mission topology projected by kernel."
    required: false
    applies_to: [crystal-company, crystal-assistant-ui-poc]
    emitted_by: [kernel]
    labels:
      - name: crystal:mission
        color: 5319e7
        description: "Mission projected by kernel."
      - name: crystal:parent
        color: 0e8a16
        description: "Orchestration parent issue."
      - name: crystal:child
        color: 1d76db
        description: "Child stage of a mission."

# =============================================================================
# 3. INTAKE — backlog/dark-factory entry flow
# =============================================================================

  intake:
    description: "Optional dark-factory intake state."
    required: false
    applies_to: all
    dark_factory_context: true
    emitted_by: [dark-factory]
    labels:
      - name: crystal:backlog
        color: 0366d6
        description: "Issue planned in Crystal backlog."
      - name: crystal:intake
        color: 1f6feb
        description: "Candidate for mission ingestion."

  mission_lifecycle:
    description: "Optional dark-factory mission lifecycle."
    required: false
    applies_to: all
    dark_factory_context: true
    emitted_by: [dark-factory, kernel]
    labels:
      - name: mission:not-imported
        color: cfd3d7
        description: "Not yet imported as a Crystal mission."
      - name: mission:imported
        color: 5319e7
        description: "Imported as a Crystal mission."
      - name: mission:in-progress
        color: 1f6feb
        description: "Mission in progress."
      - name: mission:needs-human
        color: f9d0c4
        description: "Mission awaiting human arbitration."
      - name: mission:done
        color: 0e8a16
        description: "Mission completed."

# =============================================================================
# 4. RELEASE — release milestones (free form `release:<milestone>`)
# =============================================================================

  release:
    description: "Marks a release milestone membership."
    required: false
    applies_to: all
    emitted_by: [human]
    naming: "release:<milestone-kebab>"
    labels:
      - name: release:rc1
        color: 5319e7
        description: "v1.0-rc1 cut requirement."
      - name: release:final
        color: 8B5CF6
        description: "v1.0-final tag requirement."
      - name: release:v1.x
        color: C5DEF5
        description: "Post-v1.0-final, v1.x scope."
      - name: release:v2.0
        color: BFD4F2
        description: "v2.0 scope per roadmap."
    # New release:<milestone> can be added without amending labels.yaml,
    # but must follow `release:<kebab>` to pass governance-check.

# =============================================================================
# 5. REPO-SPECIFIC — applied only to certain repos
# =============================================================================

  stream:
    description: "Crystal codenames for work streams. Reserved to dark-factory repos."
    required: false
    applies_to: [crystal-dark-factory-poc, crystal-dark-factory-target-lab]
    emitted_by: [human]
    labels:
      - name: stream:atlas
        color: 1D76DB
        description: "Stream A — operator contracts."
      - name: stream:beacon
        color: D93F0B
        description: "Stream C — Discord brain migration."
      - name: stream:forge
        color: 0E8A16
        description: "Stream B — durable spine + abstractions."
      - name: stream:compass
        color: FBCA04
        description: "Stream D — cost ledger + onboarding."

  scenario:
    description: "Lab validation scenarios. Reserved to target-lab."
    required: false
    applies_to: [crystal-dark-factory-target-lab]
    emitted_by: [human, dark-factory]
    labels:
      - name: scenario:happy-path
        color: 0e8a16
        description: "Happy-path validation scenario."
      - name: scenario:forbidden-path
        color: b60205
        description: "Forbidden write boundary scenario."
      - name: scenario:hitl
        color: f9d0c4
        description: "Human-in-the-loop scenario."
      - name: scenario:validation-fail
        color: d73a4a
        description: "Expected validation failure scenario."
      - name: scenario:evidence
        color: 6f42c1
        description: "Evidence publication scenario."

  area:
    description: "Functional domain. Free form `area:<domain-kebab>`."
    required: false
    applies_to: all
    emitted_by: [human]
    naming: "area:<domain-kebab>"
    labels:
      - name: area:ui
        color: d4c5f9
        description: "UI surface."
      - name: area:api
        color: 0366d6
        description: "API/backend surface."
      - name: area:cli
        color: c2e0c6
        description: "CLI surface."
      - name: area:docs
        color: 0075ca
        description: "Documentation."
      - name: area:infra
        color: 5319e7
        description: "Infrastructure / deployment."
      - name: area:observability
        color: fbca04
        description: "Logs, traces, metrics."

  agent:
    description: "Suggested implementation lane (human-set, distinct from kernel-projected crystal:agent:*)."
    required: false
    applies_to: [crystal-assistant-ui-poc]
    emitted_by: [human]
    labels:
      - name: agent:ui
        color: 0366d6
        description: "UI lane."
      - name: agent:api
        color: 1f6feb
        description: "API lane."

# =============================================================================
# 6. PROCESS SIGNALS — orthogonal metadata
# =============================================================================

  process:
    description: "Process metadata orthogonal to other dimensions."
    required: false
    applies_to: all
    emitted_by: [human, ci, dark-factory]
    labels:
      - name: needs-triage
        color: D4C5F9
        description: "Issue or PR awaiting product/impl triage."
      - name: tdd
        color: 0e8a16
        description: "Test-driven development tracer bullet."
      - name: testing
        color: 1d76db
        description: "Test coverage or validation contract."
      - name: target-lab
        color: 5319e7
        description: "Uses crystal-dark-factory-target-lab."
      - name: commit-qa
        color: 7B68EE
        description: "Automatic Q&A on a commit (Discord bot)."
      - name: priority:first
        color: b60205
        description: "Ordering marker (runs before implementation phases). Coexists with priority:p*."

# =============================================================================
# 7. GITHUB DEFAULTS — kept as-is for ecosystem compatibility
# =============================================================================

  github_defaults:
    description: "GitHub default labels. Kept for ecosystem compatibility."
    required: false
    applies_to: all
    emitted_by: [human]
    labels:
      # Note: `bug`, `enhancement`, `documentation` are REMOVED by
      # migrate-labels.py (replaced respectively by type:bug/feature/docs).
      - name: duplicate
        color: cfd3d7
        description: "Duplicate issue or PR."
      - name: good first issue
        color: 7057ff
        description: "Good for new contributors."
      - name: help wanted
        color: 008672
        description: "Help welcome."
      - name: invalid
        color: e4e669
        description: "Not valid."
      - name: question
        color: d876e3
        description: "Question or info request."
      - name: wontfix
        color: ffffff
        description: "Will not be fixed."
