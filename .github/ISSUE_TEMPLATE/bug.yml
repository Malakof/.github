name: "Bug — anomaly to fix"
description: "Incorrect behaviour, regression, error."
title: "fix: "
labels:
  - "type:bug"
  - "status:triage"
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What is the observed problem? What is the impact?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps to reproduce.
      placeholder: |
        1. ...
        2. ...
        3. Observed behaviour: ...
        4. Expected behaviour: ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version, OS, runtime, branch, SHA.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Conditions to consider the bug fixed.
      placeholder: |
        - [ ] Reproduction no longer triggers the bug
        - [ ] Regression test added
    validations:
      required: true
  - type: textarea
    id: links
    attributes:
      label: Links
      description: Logs, screenshots, traces, related issues.
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "p0 — production broken / data corrupted"
        - "p1 — important feature degraded"
        - "p2 — user friction"
        - "p3 — cosmetic"
      default: 1
    validations:
      required: true
