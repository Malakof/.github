name: "Mission intake — dark factory candidate"
description: "Issue candidate for ingestion as a Crystal mission by the dark factory."
title: "feature: "
labels:
  - "type:feature"
  - "priority:p2"
  - "crystal:intake"
  - "crystal:backlog"
  - "mission:not-imported"
  - "status:needs-triage"
body:
  - type: markdown
    attributes:
      value: |
        This template creates an issue candidate for dark factory ingestion. It will become a Crystal mission on the next `dark-factory epic-plan` run or manual import.

        See [governance/README.md §3.1](https://github.com/Malakof/.github/blob/main/governance/README.md#31-mission-codes) for mission code conventions.
  - type: input
    id: mission_code
    attributes:
      label: Mission code (proposed)
      description: "Format `<REPO_PREFIX>-<TYPE>-<NUM>`. Leave empty if unallocated — the dark factory or a maintainer will assign it."
      placeholder: "PAUI-FEAT-042"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why this mission. Problem or need.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What must be delivered.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
    validations:
      required: true
  - type: textarea
    id: validation_contract
    attributes:
      label: Validation contract (optional)
      description: If already defined or a draft. Otherwise left to spec-lead.
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "p0"
        - "p1"
        - "p2"
        - "p3"
      default: 2
    validations:
      required: true
  - type: dropdown
    id: runtime_preference
    attributes:
      label: Runtime preference (optional)
      description: "Suggested lane — the kernel may reassign."
      options:
        - "no preference"
        - "claude"
        - "codex"
        - "openhands"
      default: 0
    validations:
      required: false
