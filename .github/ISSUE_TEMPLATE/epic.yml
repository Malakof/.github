name: "[EPIC] Parent issue grouping sub-issues"
description: "Parent issue orchestrating multiple sub-issues. Create children as native GitHub sub-issues."
title: "[EPIC] "
labels:
  - "type:epic"
  - "priority:p2"
  - "status:needs-triage"
body:
  - type: markdown
    attributes:
      value: |
        ## How to use this template

        An EPIC groups several related deliverables. Create children as **native GitHub sub-issues** (Add → Create sub-issue in the sidebar) — not as Markdown checklists. The dark factory ingests sub-issues via the native API.

        See [governance/README.md §1.4](https://github.com/Malakof/.github/blob/main/governance/README.md#14-epic--sub-issues-workflow).
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why this EPIC, what problem or opportunity.
      placeholder: "The goal of this EPIC is to ..."
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Measurable completion conditions.
      placeholder: |
        - [ ] All sub-issues are closed
        - [ ] Validation X passes in CI
        - [ ] Doc Y is up to date
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: What is NOT covered by this EPIC.
      placeholder: "This EPIC does not address ..."
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How to verify the EPIC is delivered. Link to validation contract if applicable.
    validations:
      required: false
  - type: textarea
    id: links
    attributes:
      label: Links
      description: ADR, PRD, missions, related issues.
      placeholder: |
        - ADR-XXXX
        - PRD-XXXX
        - Mission XXXX-FEAT-001
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Execution priority (a single `priority:p*` will be applied).
      options:
        - "p0 — blocking for the current milestone"
        - "p1 — important, ship if no P0 blocker"
        - "p2 — nice to have, post-milestone"
        - "p3 — long-term backlog"
      default: 2
    validations:
      required: true
