name: "Feature — new functionality"
description: "Request or proposal for a new feature."
title: "feature: "
labels:
  - "type:feature"
  - "priority:p2"
  - "status:needs-triage"
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why this feature, user problem or technical need.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Measurable completion conditions.
      placeholder: |
        - [ ] Expected behaviour: ...
        - [ ] Tests cover: ...
        - [ ] Doc updated: ...
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How to verify the feature works (tests, scenarios, evidence).
    validations:
      required: false
  - type: textarea
    id: links
    attributes:
      label: Links
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "p0"
        - "p1"
        - "p2"
        - "p3"
      default: 2
    validations:
      required: true
