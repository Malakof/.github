name: governance-check
# Reusable workflow: validates that the target repo is aligned with its pinned governance version.
# Called from each Crystal repo:
#   on: [push, pull_request]
#   jobs:
#     governance:
#       uses: Malakof/.github/.github/workflows/governance-check.yml@v1.0.0

on:
  workflow_call:
    inputs:
      strict:
        description: "true = fail if labels diverge. false = warning."
        required: false
        default: false
        type: boolean

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate pin file exists
        run: |
          if [ ! -f ".crystal-governance.yaml" ]; then
            echo "::error::Missing .crystal-governance.yaml — see https://github.com/Malakof/.github/blob/main/governance/README.md#6-adoption-on-a-new-repo"
            exit 1
          fi

      - name: Resolve pin version
        id: pin
        run: |
          VERSION=$(grep '^governance_version:' .crystal-governance.yaml | sed 's/governance_version: *//' | tr -d '"' | xargs)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "::notice::Pin = ${VERSION}"

      - name: Verify pin tag exists in Malakof/.github
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.pin.outputs.version }}"
          if ! gh api repos/Malakof/.github/git/refs/tags/$VERSION >/dev/null 2>&1; then
            echo "::error::Pin tag $VERSION does not exist in Malakof/.github"
            exit 1
          fi

      - name: Checkout governance at pin
        uses: actions/checkout@v5
        with:
          repository: Malakof/.github
          path: .governance
          ref: ${{ steps.pin.outputs.version }}

      - name: Install Python dependencies
        run: python3 -m pip install "PyYAML>=6.0"

      - name: Verify labels align with pin
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 .governance/scripts/sync-labels.py \
            --repo "${{ github.repository }}" \
            --labels-file .governance/governance/labels.yaml \
            --check-only \
            --strict "${{ inputs.strict }}" \
            --allow-extra-labels

      - name: Validate pushed commit messages
        if: github.event_name == 'push'
        run: |
          python3 .governance/scripts/validate_commit_messages.py \
            --push-before "${{ github.event.before }}" \
            --push-after "${{ github.sha }}" \
            --ref-name "${{ github.ref_name }}" \
            --default-branch "${{ github.event.repository.default_branch }}" \
            --repo "${{ github.repository }}" \
            --scopes-file .governance/governance/scopes.yaml \
            --blocking "${{ inputs.strict }}"
