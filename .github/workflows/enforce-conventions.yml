name: enforce-conventions
# Reusable workflow: validates PR title, labels, and commit messages.
# Called from each Crystal repo:
#   on: [pull_request]
#   jobs:
#     enforce:
#       uses: Malakof/.github/.github/workflows/enforce-conventions.yml@v1.0.0

on:
  workflow_call:
    inputs:
      blocking:
        description: "true = blocking failure, false = warning only (grace period mode)"
        required: false
        default: true
        type: boolean

jobs:
  enforce:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve pin version
        id: pin
        run: |
          if [ -f ".crystal-governance.yaml" ]; then
            VERSION=$(grep '^governance_version:' .crystal-governance.yaml | sed 's/governance_version: *//' | tr -d '"' | xargs)
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "version=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout governance source
        uses: actions/checkout@v4
        with:
          repository: Malakof/.github
          path: .governance
          ref: ${{ steps.pin.outputs.version }}

      - name: Install Python dependencies
        run: python3 -m pip install "PyYAML>=6.0"

      - name: Validate PR title (Conventional Commits)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          python3 .governance/scripts/validate_title.py \
            --title "$PR_TITLE" \
            --scopes-file .governance/governance/scopes.yaml \
            --repo "${{ github.repository }}" \
            --blocking "${{ inputs.blocking }}"

      - name: Validate required labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 .governance/scripts/validate_labels.py \
            --pr "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --labels-file .governance/governance/labels.yaml \
            --blocking "${{ inputs.blocking }}"

      - name: Validate commit messages
        run: |
          python3 .governance/scripts/validate_commit_messages.py \
            --rev-range "${{ github.event.pull_request.base.sha }}..HEAD" \
            --repo "${{ github.repository }}" \
            --scopes-file .governance/governance/scopes.yaml \
            --blocking "${{ inputs.blocking }}"
